name: Daily Lead Pipeline

# Phase 8.2 — 3× täglich für Closer-Workflow (Berlin 07/11/15 Uhr).
# Smart-Schedule gegen IP-Ban-Risiko bei handelsregister.de:
#   05:00 UTC = 07:00 Berlin → FULL Crawl (handelsregister + bundesanzeiger)
#   09:00 UTC = 11:00 Berlin → DELTA-RESCORE (kein HR-Crawl, nur DB-Re-Score
#                                              + Insolvenz-Check auf Top-Leads)
#   13:00 UTC = 15:00 Berlin → DELTA-RESCORE
on:
  schedule:
    - cron: "0 5 * * *"   # FULL
    - cron: "0 9 * * *"   # DELTA
    - cron: "0 13 * * *"  # DELTA
  workflow_dispatch:
    inputs:
      mode:
        description: "Run-Modus"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - delta
      max_pages:
        description: "Wieviele Ergebnis-Seiten max? (nur full)"
        required: false
        default: "3"
      days_back:
        description: "Wieviele Tage rückwirkend?"
        required: false
        default: "1"

permissions:
  contents: read

# Phase 8.2-Audit-O: Concurrency-Mitigation für GitHub-Actions-Quota.
# Wenn ein Run noch läuft und der nächste startet (z.B. langer FULL-Run
# überlappt mit DELTA): den älteren cancel statt parallel laufen lassen.
concurrency:
  group: helium-pipeline
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    # Phase 8.2-Audit-Hotfix: 60→90 als Safety-Net.
    # Echter Fix: Pre-Score-Hard-Gates VOR BA-Call (main.py) — spart 60-80%
    # der BA-Calls bei Real-Daten. 90 Min ist Headroom für Edge-Cases.
    timeout-minutes: 90

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      LOG_LEVEL: INFO
      HEADLESS: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install pipeline
        working-directory: pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Playwright browser
        working-directory: pipeline
        run: |
          playwright install --with-deps chromium

      - name: Determine run mode
        id: mode
        run: |
          # Manual dispatch can override mode. Cron schedules map by time:
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 5 * * *" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=delta" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline (full)
        if: steps.mode.outputs.mode == 'full'
        working-directory: pipeline
        run: |
          helium-pipeline run \
            --max-pages "${{ github.event.inputs.max_pages || '3' }}" \
            --days-back "${{ github.event.inputs.days_back || '1' }}" \
            --output-dir ./local_data

      - name: Run pipeline (delta — rescore existing only)
        if: steps.mode.outputs.mode == 'delta'
        working-directory: pipeline
        run: |
          # Delta-Mode: KEIN HR-Crawl (IP-Schutz), nur Re-Scoring auf
          # bestehende Bekanntmachungen + Drift-Snapshot.
          echo "Delta-mode: rescore only (no HR crawl)"
          helium-pipeline rescore --limit 30 --min-tier t2 --output-dir ./local_data

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-run-${{ github.run_id }}
          path: pipeline/local_data/
          retention-days: 14

      - name: Notify Discord on failure
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \":warning: helium-pipeline run failed — ${{ github.run_id }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

  # Supabase Keep-Alive (Pre-Mortem U4) — 1× täglich ping, hält DB aktiv.
  # Nur beim 05:00-UTC-Schedule (sonst würde es 3× pro Tag laufen).
  keepalive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 5 * * *'
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            "${SUPABASE_URL}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}"
