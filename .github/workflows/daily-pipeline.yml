name: Daily Lead Pipeline

# Täglich 06:00 Berlin (= 04:00 UTC im Sommer, 05:00 UTC im Winter)
# Wir laufen 05:00 UTC was DST-tolerant in der Closer-Morgenphase landet.
on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Wieviele Ergebnis-Seiten max?"
        required: false
        default: "3"
      days_back:
        description: "Wieviele Tage rückwirkend?"
        required: false
        default: "1"

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      LOG_LEVEL: INFO
      HEADLESS: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install pipeline
        working-directory: pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Playwright browser
        working-directory: pipeline
        run: |
          playwright install --with-deps chromium

      - name: Run pipeline
        working-directory: pipeline
        run: |
          helium-pipeline run \
            --max-pages "${{ github.event.inputs.max_pages || '3' }}" \
            --days-back "${{ github.event.inputs.days_back || '1' }}" \
            --output-dir ./local_data

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-run-${{ github.run_id }}
          path: pipeline/local_data/
          retention-days: 14

      - name: Notify Discord on failure
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \":warning: helium-pipeline run failed — ${{ github.run_id }}\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"

  # Supabase Keep-Alive (Pre-Mortem U4) — 1× täglich ping, hält DB aktiv
  keepalive:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            "${SUPABASE_URL}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}"
